name: M005 container-id traversal probe

on:
  workflow_dispatch:

jobs:
  m005-probe:
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          set -x
          sw_vers
          uname -a
          uname -m
          xcodebuild -version || true
          swift --version || true
          pwd

      - name: Patch CLI-side container ID validation for M005 probe
        run: |
          set -x
          grep -n "validEntityName(id)" Sources/ContainerCommands/Container/ContainerCreate.swift || true
          grep -n "func validEntityName" -A 8 Sources/Services/ContainerAPIService/Client/Utility.swift || true

          python3 - <<'PY'
          from pathlib import Path

          p = Path("Sources/ContainerCommands/Container/ContainerCreate.swift")
          s = p.read_text()

          old = "try Utility.validEntityName(id)"
          if old not in s:
              raise SystemExit("validation line not found in ContainerCreate.swift")

          s = s.replace(
              old,
              "// M005 probe: bypass CLI-side validation only in this GitHub Actions test\n            // try Utility.validEntityName(id)",
              1,
          )

          p.write_text(s)
          print("patched:", p)
          PY

          grep -n "M005 probe\|validEntityName(id)" Sources/ContainerCommands/Container/ContainerCreate.swift || true

      - name: Build patched CLI, apiserver, and network plugin
        run: |
          set -x
          swift build -c debug --product container
          swift build -c debug --product container-apiserver
          swift build -c debug --product container-network-vmnet

          BIN_DIR="$(swift build -c debug --show-bin-path)"
          INSTALL_ROOT="$(dirname "$BIN_DIR")"

          echo "BIN_DIR=$BIN_DIR" | tee -a "$GITHUB_ENV"
          echo "INSTALL_ROOT=$INSTALL_ROOT" | tee -a "$GITHUB_ENV"

          echo "Binary dir: $BIN_DIR"
          ls -la "$BIN_DIR" | grep -E 'container$|container-apiserver$|container-network-vmnet$|container-|apiserver|vmnet' || true

          test -x "$BIN_DIR/container" || (echo "missing container binary at $BIN_DIR/container" && exit 1)
          test -x "$BIN_DIR/container-apiserver" || (echo "missing container-apiserver binary at $BIN_DIR/container-apiserver" && exit 1)
          test -x "$BIN_DIR/container-network-vmnet" || (echo "missing container-network-vmnet binary at $BIN_DIR/container-network-vmnet" && exit 1)

          "$BIN_DIR/container" --help | head -50
          "$BIN_DIR/container-apiserver" --help || true
          "$BIN_DIR/container-network-vmnet" --help || true

      - name: Stage network plugin layout
        run: |
          set -x

          PLUGIN_ROOT="$INSTALL_ROOT/libexec/container-plugins"
          NETWORK_PLUGIN_DIR="$PLUGIN_ROOT/container-network-vmnet"

          mkdir -p "$NETWORK_PLUGIN_DIR/bin"

          cp Sources/Plugins/NetworkVmnet/config.toml "$NETWORK_PLUGIN_DIR/config.toml"
          cp "$BIN_DIR/container-network-vmnet" "$NETWORK_PLUGIN_DIR/bin/container-network-vmnet"
          chmod +x "$NETWORK_PLUGIN_DIR/bin/container-network-vmnet"

          echo "PLUGIN_ROOT=$PLUGIN_ROOT" | tee -a "$GITHUB_ENV"
          echo "NETWORK_PLUGIN_DIR=$NETWORK_PLUGIN_DIR" | tee -a "$GITHUB_ENV"

          echo "=== staged plugin tree ==="
          find "$PLUGIN_ROOT" -maxdepth 5 -print

          echo "=== network config.toml ==="
          cat "$NETWORK_PLUGIN_DIR/config.toml"

      - name: Write timeout runner
        run: |
          cat > /tmp/run_timeout.py <<'PY'
          import shlex
          import subprocess
          import sys

          timeout = int(sys.argv[1])
          cmd = sys.argv[2:]

          print("RUN:", " ".join(shlex.quote(x) for x in cmd), flush=True)
          print("TIMEOUT:", timeout, "seconds", flush=True)

          try:
              p = subprocess.run(
                  cmd,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  timeout=timeout,
              )
              print(p.stdout, end="", flush=True)
              print("EXIT_CODE:", p.returncode, flush=True)
              sys.exit(0)
          except subprocess.TimeoutExpired as e:
              out = e.stdout or ""
              if isinstance(out, bytes):
                  out = out.decode(errors="replace")
              print(out, end="", flush=True)
              print("TIMEOUT_EXPIRED: killed command", flush=True)
              sys.exit(0)
          PY

      - name: Try to start container system with network plugin
        continue-on-error: true
        run: |
          set -x
          echo "BIN_DIR=$BIN_DIR"
          echo "INSTALL_ROOT=$INSTALL_ROOT"
          echo "PLUGIN_ROOT=$PLUGIN_ROOT"

          echo "=== plugin tree before start ==="
          find "$INSTALL_ROOT/libexec/container-plugins" -maxdepth 5 -print || true

          python3 /tmp/run_timeout.py 90 "$BIN_DIR/container" system start

          echo "=== system status ==="
          python3 /tmp/run_timeout.py 30 "$BIN_DIR/container" system status

          echo "=== launchctl print apiserver ==="
          launchctl print gui/$(id -u)/com.apple.container.apiserver || true

          echo "=== ps container ==="
          ps aux | grep -i container | grep -v grep || true

          echo "=== app support after start ==="
          find "$HOME/Library/Application Support" -maxdepth 5 -iname '*container*' -print 2>/dev/null || true

          echo "=== recent logs ==="
          log show --last 5m --style compact --predicate 'process CONTAINS "container"' || true

      - name: M005 traversal create attempt with network plugin
        continue-on-error: true
        run: |
          set -x
          echo "BIN_DIR=$BIN_DIR"
          python3 /tmp/run_timeout.py 90 "$BIN_DIR/container" create --name '../m005-poc' docker.io/library/alpine:latest

      - name: M005 traversal create attempt with network none
        continue-on-error: true
        run: |
          set -x
          echo "BIN_DIR=$BIN_DIR"
          python3 /tmp/run_timeout.py 90 "$BIN_DIR/container" create --network none --name '../m005-poc-nonet' docker.io/library/alpine:latest

      - name: Search for M005 nonet artifacts
        run: |
          set -x
          echo "Search for m005-poc-nonet:"
          find "$HOME/Library/Application Support" -path '*m005-poc-nonet*' -print 2>/dev/null || true

          echo "Search for runtime-configuration.json under m005-poc-nonet:"
          find "$HOME/Library/Application Support" -name 'runtime-configuration.json' -path '*m005-poc-nonet*' -print 2>/dev/null || true

          echo "Canonical realpaths for m005-poc-nonet:"
          python3 - <<'PY'
          import os, glob
          base = os.path.expanduser("~/Library/Application Support")
          for p in glob.glob(base + "/**/*m005-poc-nonet*", recursive=True):
              print("PATH:", p)
              print("REAL:", os.path.realpath(p))
          PY

      - name: Search for M005 artifacts
        run: |
          set -x

          echo "Search under HOME Library/Application Support:"
          find "$HOME/Library/Application Support" -path '*m005-poc*' -print 2>/dev/null || true

          echo "Search for runtime-configuration.json containing m005-poc:"
          find "$HOME/Library/Application Support" -name 'runtime-configuration.json' -path '*m005-poc*' -print 2>/dev/null || true

          echo "Canonical realpaths:"
          python3 - <<'PY'
          import os, glob
          base = os.path.expanduser("~/Library/Application Support")
          for p in glob.glob(base + "/**/*m005-poc*", recursive=True):
              print("PATH:", p)
              print("REAL:", os.path.realpath(p))
          PY

          echo "Container-related app support tree:"
          find "$HOME/Library/Application Support" -maxdepth 5 -iname '*container*' -print 2>/dev/null || true

